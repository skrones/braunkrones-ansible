- hosts: localhost
  become: true
  vars_files:
    - ../secrets.yml
  roles:

    - role: user_create
      vars:
        user_name: "ansible"
        system: true
        group: wheel
        sudo_policy: "ansible ALL=(ALL) NOPASSWD:ALL"
        user_password: "{{ ansible_user_pass }}"

