- hosts: localhost
  become: true
  vars_files:
    - ../secrets.yml
  vars_prompt:
    - name: host_name
      prompt: "Enter the hostname for the system"
      private: no

  tasks:
    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ host_name }}"
      become: true

  roles:
    - role: user_create
      vars:
        user_name: "ansible"
        system: true
        group: wheel
        sudo_policy: "ansible ALL=(ALL) NOPASSWD:ALL"
        user_password: "{{ ansible_user_pass }}"

    - role: sshd_install

    
    - role: ssh_create_keypair
      vars:
        ssh_key_user: ansible
        type: ed25519
        comment: "ansible@{{ inventory_hostname }}"
        regenerate: never

    - role: ssh_create_keypair
      vars:
        ssh_key_user: skrones
        type: ed25519
        comment: "skrones@{{ inventory_hostname }}"
        regenerate: never

    - role: ssh_sync_authorised-users
      vars: 
        ssh_key_user: ansible
        github_key_title_prefix: "ansible@"

    # Needs to be created
    #- role: sshd_configure