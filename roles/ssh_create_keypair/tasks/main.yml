- name: Look up target user
  ansible.builtin.getent:
    database: passwd
    key: "{{ ssh_key_user }}"

- name: Resolve target user's SSH paths and ownership
  ansible.builtin.set_fact:
    ssh_key_home: "{{ ansible_facts.getent_passwd[ssh_key_user][4] }}"
    ssh_key_group: "{{ ansible_facts.getent_passwd[ssh_key_user][2] }}"

- name: Ensure target user's .ssh directory exists
  ansible.builtin.file:
    path: "{{ ssh_key_home }}/.ssh"
    state: directory
    owner: "{{ ssh_key_user }}"
    group: "{{ ssh_key_group }}"
    mode: "0700"

- name: Create SSH key pair
  community.crypto.openssh_keypair:
    path: "{{ ssh_key_home }}/.ssh/id_ed25519"
    type: "{{ type | default('ed25519') }}"
    owner: "{{ ssh_key_user }}"
    group: "{{ ssh_key_group }}"
    mode: "0600"
    comment: "{{ comment | default(ssh_key_user ~ '@' ~ host_name) }}"
    regenerate: "{{ regenerate | default('never') }}"

- name: Check for public key
  ansible.builtin.stat:
    path: "{{ ssh_key_home }}/.ssh/id_ed25519.pub"
  register: ssh_public_key_stat

- name: Ensure public key ownership is correct
  ansible.builtin.file:
    path: "{{ ssh_key_home }}/.ssh/id_ed25519.pub"
    state: file
    owner: "{{ ssh_key_user }}"
    group: "{{ ssh_key_group }}"
    mode: "0644"
  when: ssh_public_key_stat.stat.exists

- name: Read public key
  ansible.builtin.slurp:
    src: "{{ ssh_key_home }}/.ssh/id_ed25519.pub"
  register: ssh_public_key
  when: ssh_public_key_stat.stat.exists

