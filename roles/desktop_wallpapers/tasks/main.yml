- name: Require desktop user for wallpaper management
  ansible.builtin.assert:
    that:
      - desktop_user is defined
      - desktop_user | length > 0
    fail_msg: >-
      Set desktop_user to the local desktop account before enabling
      desktop_wallpapers.

- name: Look up desktop user
  ansible.builtin.getent:
    database: passwd
    key: "{{ desktop_user }}"

- name: Resolve desktop user account facts
  ansible.builtin.set_fact:
    desktop_wallpapers_user_uid: "{{ ansible_facts.getent_passwd[desktop_user][1] }}"
    desktop_wallpapers_user_gid: "{{ ansible_facts.getent_passwd[desktop_user][2] }}"
    desktop_wallpapers_user_home: "{{ desktop_wallpapers_home }}"
    desktop_wallpapers_user_systemd_environment:
      XDG_RUNTIME_DIR: "/run/user/{{ ansible_facts.getent_passwd[desktop_user][1] }}"
      DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ ansible_facts.getent_passwd[desktop_user][1] }}/bus"
      HOME: "{{ desktop_wallpapers_home }}"

- name: Ensure wallpaper directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ desktop_user }}"
    group: "{{ desktop_wallpapers_user_gid }}"
    mode: "{{ desktop_wallpapers_wallpaper_directory_mode }}"
  loop:
    - "{{ desktop_wallpapers_directory | dirname }}"
    - "{{ desktop_wallpapers_directory }}"

- name: Ensure user systemd directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ desktop_user }}"
    group: "{{ desktop_wallpapers_user_gid }}"
    mode: "{{ desktop_wallpapers_config_directory_mode }}"
  loop:
    - "{{ desktop_wallpapers_user_home }}/.config"
    - "{{ desktop_wallpapers_user_home }}/.config/systemd"
    - "{{ desktop_wallpapers_user_home }}/.config/systemd/user"

- name: Enable lingering for desktop user
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ desktop_user }}"
    creates: "/var/lib/systemd/linger/{{ desktop_user }}"
  when: desktop_wallpapers_manage_user_linger

- name: Start desktop user systemd manager
  ansible.builtin.systemd_service:
    name: "user@{{ ansible_facts.getent_passwd[desktop_user][1] }}.service"
    state: started
  when: desktop_wallpapers_start_user_manager

- name: Install HydraPaper wallpaper service
  ansible.builtin.template:
    src: hydrapaper-wallpaper.service.j2
    dest: "{{ desktop_wallpapers_user_home }}/.config/systemd/user/{{ desktop_wallpapers_hydrapaper_service_name }}"
    owner: "{{ desktop_user }}"
    group: "{{ desktop_wallpapers_user_gid }}"
    mode: "{{ desktop_wallpapers_unit_file_mode }}"
  register: desktop_wallpapers_hydrapaper_service

- name: Install HydraPaper wallpaper timer
  ansible.builtin.template:
    src: hydrapaper-wallpaper.timer.j2
    dest: "{{ desktop_wallpapers_user_home }}/.config/systemd/user/{{ desktop_wallpapers_hydrapaper_timer_name }}"
    owner: "{{ desktop_user }}"
    group: "{{ desktop_wallpapers_user_gid }}"
    mode: "{{ desktop_wallpapers_unit_file_mode }}"
  register: desktop_wallpapers_hydrapaper_timer

- name: Reload desktop user systemd units
  ansible.builtin.systemd_service:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ desktop_user }}"
  environment: "{{ desktop_wallpapers_user_systemd_environment }}"
  when: >-
    desktop_wallpapers_hydrapaper_service.changed | default(false)
    or desktop_wallpapers_hydrapaper_timer.changed | default(false)

- name: Enable HydraPaper wallpaper timer
  ansible.builtin.systemd_service:
    name: "{{ desktop_wallpapers_hydrapaper_timer_name }}"
    enabled: true
    state: "{{ desktop_wallpapers_start_timers | ternary('started', omit) }}"
    scope: user
  become: true
  become_user: "{{ desktop_user }}"
  environment: "{{ desktop_wallpapers_user_systemd_environment }}"